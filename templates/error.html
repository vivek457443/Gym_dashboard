{% extends "base.html" %}
{% block heading %}Error{% endblock %}
{% block content %}
<div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow text-center">
  <h1 class="text-4xl font-bold">{{ code }}</h1>
  <p class="mt-2 text-gray-500">{{ detail }}</p>
  <a href="/dashboard" class="inline-block mt-4 px-4 py-2 bg-indigo-600 text-white rounded-lg">Go home</a>

</div>
{% endblock %}
