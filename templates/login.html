{% extends "base.html" %}
{% block title %}Login | GymAdmin{% endblock %}
{% block guest %}
<div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-500 to-purple-600">
  <div class="w-full max-w-sm bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
    <h1 class="text-2xl font-bold text-center mb-1">🏋️ GymAdmin</h1>
    <p class="text-center text-sm text-gray-500 dark:text-gray-400 mb-6">Sign in to your dashboard</p>
    {% if error %}<div class="mb-4 p-2 text-sm bg-red-100 text-red-700 rounded">{{ error }}</div>{% endif %}
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm mb-1">Username</label>
        <input name="username" required class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" value="admin"/>
      </div>
      <div>
        <label class="block text-sm mb-1">Password</label>
        <input type="password" name="password" required class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" value="admin123"/>
      </div>
      <button class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium">Sign in</button>
    </form>
    <p class="text-xs text-center mt-4 text-gray-400">Default: admin / admin123</p>
  </div>
</div>
{% endblock %}
